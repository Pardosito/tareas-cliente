<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Ian Rodríguez</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

    <header role="banner">
        <div class="container header-content">
            <h1>Contacto</h1>
            <nav aria-label="Navegación">
                <ul>
                    <li><a href="index.html">Volver al CV</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main-content">
        <section class="container" style="max-width: 600px; padding-top: 2rem;">
            <h2>Ponte en contacto conmigo</h2>

            <form id="contactForm" action="https://formsubmit.co/ianrdzwong@gmail.com" method="POST" aria-label="Formulario de contacto" novalidate>
                <input type="hidden" name="_subject" value="Nuevo contacto desde Portafolio Web">

                <div class="form-group">
                    <label for="name">Nombre Completo <span aria-hidden="true">*</span></label>
                    <input type="text" id="name" name="name" required autocomplete="name" aria-required="true" aria-invalid="false" aria-describedby="name-error">
                    <span id="name-error" class="error-message">Por favor, ingresa tu nombre.</span>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico <span aria-hidden="true">*</span></label>
                    <input type="email" id="email" name="email" required autocomplete="email" aria-required="true" aria-invalid="false" aria-describedby="email-error">
                    <span id="email-error" class="error-message">Por favor, ingresa un correo electrónico válido.</span>
                </div>

                <div class="form-group">
                    <label for="message">Mensaje <span aria-hidden="true">*</span></label>
                    <textarea id="message" name="message" rows="5" required aria-required="true" aria-invalid="false" aria-describedby="message-error"></textarea>
                    <span id="message-error" class="error-message">El mensaje no puede estar vacío.</span>
                </div>

                <button type="submit" class="btn-primary">Enviar Correo</button>
            </form>
        </section>
    </main>

    <script>
        // Manejo básico de errores de formulario solicitado
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', function(e) {
            let isValid = true;
            const inputs = form.querySelectorAll('input[required], textarea[required]');

            inputs.forEach(input => {
                if (!input.value.trim() || (input.type === 'email' && !input.value.includes('@'))) {
                    input.setAttribute('aria-invalid', 'true');
                    document.getElementById(input.id + '-error').style.display = 'block';
                    isValid = false;
                } else {
                    input.setAttribute('aria-invalid', 'false');
                    document.getElementById(input.id + '-error').style.display = 'none';
                }
            });

            if (!isValid) e.preventDefault();
        });
    </script>
</body>
</html>
