<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Ian Rodríguez</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header role="banner">
        <div class="container">
            <h1>Contacto</h1>
            <nav>
                <a href="index.html" class="back-link">Volver al CV</a>
            </nav>
        </div>
    </header>

    <main id="main-content" class="contact-page">
        <section class="container form-container">
            <h2>Ponte en contacto conmigo</h2>

            <form action="https://formsubmit.co/ianrdzwong@gmail.com" method="POST" class="contact-form" aria-label="Formulario de contacto">

                <input type="hidden" name="_next" value="http://tue-sitio.com/gracias.html">
                <input type="hidden" name="_subject" value="Nuevo contacto desde Portafolio Web">

                <div class="form-group">
                    <label for="name">Nombre Completo <span aria-hidden="true">*</span></label>
                    <input type="text" id="name" name="name" required autocomplete="name" aria-required="true">
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico <span aria-hidden="true">*</span></label>
                    <input type="email" id="email" name="email" required autocomplete="email" aria-required="true">
                </div>

                <div class="form-group">
                    <label for="message">Mensaje <span aria-hidden="true">*</span></label>
                    <textarea id="message" name="message" rows="5" required aria-required="true"></textarea>
                </div>

                <button type="submit" class="btn-primary">Enviar Correo</button>
            </form>
        </section>
    </main>
</body>
</html>
